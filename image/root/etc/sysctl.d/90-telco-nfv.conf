# ===========================================================================
# /etc/sysctl.d/90-telco-nfv.conf
#
# Telco/NFV Network & Memory Performance Tuning
# Applied automatically at boot by systemd-sysctl.service
# ===========================================================================

# --- Network Buffer Tuning ---
# Increase buffers for burst traffic handling at line-rate (10G/25G)
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.core.rmem_default = 65536
net.core.wmem_default = 65536
net.core.netdev_max_backlog = 250000
net.core.somaxconn = 65535

# TCP tuning
net.ipv4.tcp_rmem = 4096 87380 134217728
net.ipv4.tcp_wmem = 4096 65536 134217728
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_window_scaling = 1

# --- Memory ---
# Disable swap (Telco = low-latency, swap is unacceptable)
vm.swappiness = 0

# HugePages reservation
vm.nr_hugepages = 1024
vm.hugetlb_shm_group = 0

# Panic on OOM instead of random kill (predictable failure mode)
vm.panic_on_oom = 0
vm.overcommit_memory = 0

# --- Kernel ---
# NUMA balancing (let kernel optimize memory placement)
kernel.numa_balancing = 1
